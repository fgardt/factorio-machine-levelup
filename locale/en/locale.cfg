[mod-name]
machine-levelup=Machine Levelup

[mod-description]
machine-levelup=Machines upgrade their quality after crafting a certain amount of items.

[mod-setting-name]
ml-exp=Levelup threshold exponent
ml-fac=Levelup threshold factor

[mod-setting-description]
ml-exp=The formula for calculating the levelup threshold is:\n[font=default-small-semibold]ceil((ln(next_quality_level + 1) ^ exponent) * factor)[/font]\nWith the default values the thresholds are:\n[quality=normal]->[quality=uncommon]: ~2.2k\n[quality=uncommon]->[quality=rare]: ~11k\n[quality=rare]->[quality=epic]: ~25k\n[quality=epic]->[quality=legendary]: ~62k
